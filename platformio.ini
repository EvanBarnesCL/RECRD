[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps = 
	watterott/digitalWriteFast@^1.0.0
	https://github.com/EvanBarnesCL/Crunchlabs_DRV8835.git
	https://github.com/DevelopiumTech/VEML3328.git
