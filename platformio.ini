[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps = 
	siteswapjuggler/Ramp@^0.6.2
	adafruit/Adafruit APDS9960 Library@^1.3.0
